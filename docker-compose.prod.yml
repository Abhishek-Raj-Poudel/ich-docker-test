services:
  # MySQL Database
  db:
    image: mysql:8.4
    container_name: insurance-claim-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - insurance-network

  # Redis for Celery
  redis:
    image: redis:7-alpine
    container_name: insurance-claim-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data
    networks:
      - insurance-network

  # Main Insurance API
  api:
    build:
      context: ./Insurance-Claim-Help-API
      dockerfile: Dockerfile
    image: insurance-claim-help:latest
    env_file:
      - ./Insurance-Claim-Help-API/.env
    restart: always
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - api_media:/app/media
      - api_static:/app/staticfiles
    networks:
      - insurance-network
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --worker-class sync
    expose:
      - "8000"

  # Microservice (Room Analysis)
  microservice:
    build:
      context: ./Insurance-Claim-Help-Microservice
      dockerfile: Dockerfile
    image: insurance-claim-microservice:latest
    env_file:
      - ./Insurance-Claim-Help-Microservice/.env
    environment:
      INTERNAL_PROPERTY_API_BASE_URL: http://api:8000/api/
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - microservice_media:/app/media
      - microservice_static:/app/staticfiles
    networks:
      - insurance-network
    command: gunicorn Insurance_Claim.wsgi:application --bind 0.0.0.0:8000 --workers 4 --worker-class sync
    expose:
      - "8000"

  # Celery Worker for async tasks
  worker:
    build:
      context: ./Insurance-Claim-Help-Microservice
      dockerfile: Dockerfile
    image: insurance-claim-microservice:latest
    env_file:
      - ./Insurance-Claim-Help-Microservice/.env
    environment:
      INTERNAL_PROPERTY_API_BASE_URL: http://api:8000/api/
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - microservice_media:/app/media
    networks:
      - insurance-network
    command: celery -A Insurance_Claim worker -l info --concurrency=4

volumes:
  mysql_data:
  redis_data:
  api_media:
  api_static:
  microservice_media:
  microservice_static:

networks:
  insurance-network:
    driver: bridge
