<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ heading }}</title>
</head>
<body style="margin:0;padding:0;background:#f4f7fb;font-family:Arial,sans-serif;color:#1f2937;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f7fb;padding:24px 0;">
        <tr>
            <td align="center">
                <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border-radius:16px;overflow:hidden;">
                    <tr>
                        <td style="background:#0f172a;padding:32px 24px;text-align:center;">
                            <table role="presentation" cellspacing="0" cellpadding="0" align="center" style="margin:0 auto;">
                                <tr>
                                    <td style="background:#ffffff;border-radius:12px;padding:14px 18px;text-align:center;">
                                        <img src="cid:{{ logo_cid }}" alt="Insurance Claim Help" style="display:block;max-width:160px;height:auto;margin:0 auto;">
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:32px;">
                            <h1 style="margin:0 0 16px;font-size:24px;">{{ heading }}</h1>
                            <p style="margin:0 0 16px;">Hello {{ user.name }},</p>
                            <p style="margin:0 0 24px;">{{ intro }}</p>
                            <div style="margin:0 0 24px;padding:16px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;text-align:center;">
                                <span style="font-size:32px;font-weight:700;letter-spacing:8px;color:#1d4ed8;">{{ otp }}</span>
                            </div>
                            <p style="margin:0 0 12px;">This OTP expires in {{ expiry_minutes }} minutes.</p>
                            <p style="margin:0;">If you did not request this email, you can ignore it.</p>
                            <p style="margin:24px 0 0;padding-top:20px;border-top:1px solid #e5e7eb;font-size:12px;line-height:1.6;color:#6b7280;text-align:center;">
                                Copyright &copy; Insurance Claim Help&trade;. All rights reserved.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
