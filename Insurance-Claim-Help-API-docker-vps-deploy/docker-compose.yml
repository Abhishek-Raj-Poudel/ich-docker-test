services:
  app:
    build:
      context: .
    image: insurance-claim-help:latest
    env_file:
      - .env.production
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    networks:
      default:
      shared:
        aliases:
          - insurance-api

  db:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - .env.production
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
  media_data:
  static_data:

networks:
  shared:
    name: insurance-claim-help-network
