services:
  app:
    build:
      context: .
    image: insurance-claim-microservice:latest
    env_file:
      - .env.production
    environment:
      INTERNAL_PROPERTY_API_BASE_URL: http://insurance-api:8000/api/
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8001:8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    networks:
      default:
      shared:
        aliases:
          - insurance-microservice

  worker:
    image: insurance-claim-microservice:latest
    env_file:
      - .env.production
    environment:
      INTERNAL_PROPERTY_API_BASE_URL: http://insurance-api:8000/api/
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    entrypoint: []
    command: ["celery", "-A", "Insurance_Claim", "worker", "-l", "info"]
    volumes:
      - media_data:/app/media
    networks:
      default:
      shared:
        aliases:
          - insurance-microservice-worker

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data

  db:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - .env.production
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
  media_data:
  static_data:
  redis_data:

networks:
  shared:
    name: insurance-claim-help-network
