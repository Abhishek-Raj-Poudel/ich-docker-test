services:
  # MySQL Database shared by both Django services
  db:
    image: mysql:8.4
    container_name: insurance-claim-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: insurance_claim_help
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - insurance-network
    expose:
      - "3306"

  # Redis for Celery
  redis:
    image: redis:7-alpine
    container_name: insurance-claim-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data
    networks:
      - insurance-network
    expose:
      - "6379"

  # Main Insurance API
  api:
    build:
      context: ./Insurance-Claim-Help-API
      dockerfile: Dockerfile
    container_name: insurance-api
    image: insurance-claim-help:latest
    env_file:
      - ./Insurance-Claim-Help-API/.env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      REDIS_URL: redis://redis:6379/1
      MICROSERVICE_API_BASE_URL: http://microservice:8000/api/
      MICROSERVICE_INTERNAL_API_BASE_URL: http://microservice:8000/api/
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - api_media:/app/media
      - api_static:/app/staticfiles
    networks:
      - insurance-network
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application

  # Microservice (Room Analysis)
  microservice:
    build:
      context: ./Insurance-Claim-Help-Microservice
      dockerfile: Dockerfile
    container_name: insurance-microservice
    image: insurance-claim-microservice:latest
    env_file:
      - ./Insurance-Claim-Help-Microservice/.env
    environment:
      INTERNAL_PROPERTY_API_BASE_URL: http://api:8000/api/
      PROPERTY_API_BASE_URL: http://api:8000/api/
      LARAVEL_API_BASE_URL: http://api:8000/api/
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8001:8000"
    volumes:
      - microservice_media:/app/media
      - microservice_static:/app/staticfiles
    networks:
      - insurance-network
    command: gunicorn Insurance_Claim.wsgi:application --bind 0.0.0.0:8000 --workers 2

  # Celery Worker for async tasks
  worker:
    build:
      context: ./Insurance-Claim-Help-Microservice
      dockerfile: Dockerfile
    container_name: insurance-worker
    image: insurance-claim-microservice:latest
    env_file:
      - ./Insurance-Claim-Help-Microservice/.env
    environment:
      INTERNAL_PROPERTY_API_BASE_URL: http://api:8000/api/
      PROPERTY_API_BASE_URL: http://api:8000/api/
      LARAVEL_API_BASE_URL: http://api:8000/api/
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - microservice_media:/app/media
    networks:
      - insurance-network
    command: celery -A Insurance_Claim worker -l info

volumes:
  mysql_data:
  redis_data:
  api_media:
  api_static:
  microservice_media:
  microservice_static:

networks:
  insurance-network:
    driver: bridge
